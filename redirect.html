<!DOCTYPE html>
<html>
<body>
<script>
const params = new URLSearchParams(window.location.search);
const code = params.get('code');
if(code){
  localStorage.setItem('spotify_auth_code', code);
  window.location.href='index.html';
}else{
  document.body.innerHTML='Error: No code found.';
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang='sv'>
<head>
<meta charset='UTF-8'>
<title>Spotify Musikquiz</title>
<link rel='stylesheet' href='style.css'>
</head>
<body>
<div class='container'>
<h1>🎵 Glow Spotify Musikquiz</h1>
<button id='loginBtn'>Logga in med Spotify</button>  
<div id="playlistInputArea" class="hidden">
  <input
    id="playlistInput"
    type="text"
    placeholder="https://open.spotify.com/playlist/3pEXYGttJuLxSlrxN4UDcn?si=5295cc7e18e74a96&pt=c318d1ec76fc64029284076c52f1bef3"
  />
  <button id="loadPlaylistBtn">Starta quiz</button>
</div>

<div id='quizArea' class='hidden'>
  <h2 id='questionText'></h2>
  <audio id='audioPlayer' controls></audio>
  <div id='options'></div>
  <div id='result'></div>
  <button id='nextBtn' class='hidden'>Nästa fråga</button>
</div>
</div>
<script src='script.js'></script>
</body>
</html>

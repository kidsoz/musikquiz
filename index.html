<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Spotify test</title>
</head>
<body>

<button id="login">Logga in med Spotify</button>

<script>
  const CLIENT_ID = "cb562e24e68e49bdb497b65bc42cd010";
  const REDIRECT_URI = "https://kidsoz.github.io/musikquiz/index.html";

  document.getElementById("login").onclick = () => {
    const url =
      "https://accounts.spotify.com/authorize" +
      "?response_type=code" +
      "&client_id=" + CLIENT_ID +
      "&redirect_uri=" + encodeURIComponent(REDIRECT_URI);

    window.location.href = url;
  };
</script>

</body>
</html>
